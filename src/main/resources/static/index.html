<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUALIS Periódicos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

</head>
<body>

<header>
    <img src="qualis-logo.png" alt="QUALIS">
    <div class="divisor"></div>
    <p class ="titulo-card"> Consulta de Classificações de Periódicos Acadêmicos</p>
</header>
<main>
    <section class="grade-busca">
        <div class="card">
            <h3 class="titulo-card">Buscar por ISSN</h3>
            <div class="linha-input">
                <input type="text" id="input-issn" name="issn" placeholder="Ex: 0001-3765">
                <button id="btn-issn">Buscar</button>
            </div>
        </div>
        <div class="card">
            <h3 class="titulo-card">Buscar por Título</h3>
            <div class="linha-input">
                <input type="text" id="input-titulo" placeholder="Ex: Ciências, Matematica...">
                <button id="btn-titulo">Buscar</button>
            </div>
        </div>
        <div class="card">
            <h3 class="titulo-card">Buscar por Área</h3>
            <div class="linha-input">
                <select id="select-area">
                    <option value="">Selecione uma area...</option>
                </select>
                <button id="btn-area">Buscar</button>
            </div>
        </div>
        <div class="card">
            <h3 class="titulo-card">Buscar por Estrato</h3>
            <div class="linha-input">
                <select id="select-estrato">
                    <option value="">Selecione um estrato...</option>
                    <option>A1</option>
                    <option>A2</option>
                    <option>A3</option>
                    <option>A4</option>
                    <option>B1</option>
                    <option>B2</option>
                    <option>B3</option>
                    <option>B4</option>
                    <option>C</option>
                </select>
                <button id="btn-estrato">Buscar</button>
            </div>
        </div>
    </section>
    <section class="secao-resultados">
        <div class="cabecalho-resultados">
        <span class="titulo-card">Resultados</span>

            <span id="contagem-resultados" class="badge">0 periódicos</span>
        </div>
        <div id="corpo-resultados">
            <p class="estado-vazio">Use os filtros acima para buscar periódicos</p>
        </div>
    </section>

    <section class="secao-grafico">
        <div class="cabecalho-grafico">
            <h3 class="titulo-card">Distribuição por Estrato</h3>
            <div class="linha-input">
                <select id="select-area-grafico">
                    <option value="">Selecione uma área...</option>
                </select>
                <button id="btn-grafico">Ver</button>
            </div>
        </div>

        <div id="barras-grafico">
            <p class="estado-vazio">Selecione uma área para ver a distribuição.</p>
        </div>
    </section>
</main>

<script src="script.js"></script>
</body>
</html>
